name: Deploy WK Project Resolver

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_PATH: WKProjectSolver/WKProjectSolver.csproj

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish app
      run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish
    
    - name: Zip release
      run: powershell -Command "Compress-Archive -Path publish -DestinationPath WKProjectResolver.zip"
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: WKProjectResolver.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
